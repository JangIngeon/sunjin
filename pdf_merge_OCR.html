<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 첫 페이지 병합</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: #f6f5f1;
    color: #1c2321;
    font-family: -apple-system, "Pretendard", sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 20px;
  }

  .sheet {
    width: 100%;
    max-width: 560px;
  }

  h1 {
    font-size: 22px;
    margin: 0 0 24px;
  }

  #dropzone {
    border: 1.5px dashed #ccc;
    border-radius: 4px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    font-size: 13.5px;
    color: #666;
    background: #fff;
  }

  #dropzone.drag { border-color: #2f5d50; background: #e7efe9; }

  #fileInput { display: none; }

  #fileList {
    list-style: none;
    margin: 14px 0 0;
    padding: 0;
    font-size: 13px;
  }

  #fileList li {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid #ddd;
  }

  .rm { cursor: pointer; color: #9a3324; font-weight: 600; }

  button {
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 3px;
    padding: 12px 18px;
    cursor: pointer;
    width: 100%;
    margin-top: 16px;
    background: #2f5d50;
    color: #fff;
  }

  button:disabled { opacity: 0.4; cursor: not-allowed; }

  #status { font-size: 12.5px; color: #2f5d50; margin-top: 12px; min-height: 18px; }
  #status.error { color: #9a3324; }

  a.download-link {
    display: none;
    text-align: center;
    text-decoration: none;
    background: #1c2321;
    color: #fff;
    font-weight: 600;
    font-size: 14px;
    padding: 12px 18px;
    border-radius: 3px;
    margin-top: 16px;
  }
  a.download-link.show { display: block; }

  #ocrSection {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid #ddd;
  }

  #ocrSection h2 {
    font-size: 15px;
    margin: 0 0 12px;
  }

  #ocrSection ol {
    margin: 0 0 14px;
    padding-left: 18px;
    font-size: 13.5px;
    line-height: 2;
    color: #444;
  }

  .link-btn {
    display: block;
    text-align: center;
    text-decoration: none;
    border: 1.5px solid #2f5d50;
    color: #2f5d50;
    font-weight: 600;
    font-size: 14px;
    padding: 11px 18px;
    border-radius: 3px;
  }
  .link-btn:hover { background: #e7efe9; }
</style>
</head>
<body>

<div class="sheet">
  <h1>PDF 첫 페이지 추출 + 병합</h1>

  <div id="dropzone">
    클릭하거나 파일을 이 영역에 끌어다 놓으세요<br>
    <strong>여러 개 선택 가능</strong>
  </div>
  <input type="file" id="fileInput" accept="application/pdf" multiple="">
  <ul id="fileList"></ul>

  <button id="mergeBtn" disabled="">첫 페이지 추출 후 병합</button>
  <div id="status"></div>
  <a class="download-link" id="downloadLink" download="병합_첫페이지.pdf">병합 PDF 다운로드</a>

  <div id="ocrSection">
    <h2>PDF24에서 한국어 OCR 적용하기</h2>
    <ol>
      <li>병합한(또는 원하는) PDF를 PDF24 업로드 상자에 끌어다 놓기</li>
      <li>언어 설정에서 <strong>Korean(한국어)</strong> 선택</li>
      <li><strong>OCR 강제(Force OCR)</strong> 옵션 체크</li>
      <li>OCR 시작 → 완료되면 결과 파일 다운로드</li>
    </ol>
    <a class="link-btn" href="https://tools.pdf24.org/ko/ocr-pdf" target="_blank" rel="noopener" id="ocrLinkBtn">🔗 PDF24 OCR 페이지 새 탭에서 열기</a>
  </div>
</div>

<script>
const { PDFDocument } = PDFLib;

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const fileListEl = document.getElementById('fileList');
const mergeBtn = document.getElementById('mergeBtn');
const statusEl = document.getElementById('status');
const downloadLink = document.getElementById('downloadLink');
const ocrSection = document.getElementById('ocrSection');

let files = []; // { name, arrayBuffer }

dropzone.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
  addFiles(Array.from(e.target.files));
  fileInput.value = '';
});

['dragenter', 'dragover'].forEach(evt => {
  dropzone.addEventListener(evt, (e) => {
    e.preventDefault();
    dropzone.classList.add('drag');
  });
});

['dragleave', 'drop'].forEach(evt => {
  dropzone.addEventListener(evt, (e) => {
    e.preventDefault();
    dropzone.classList.remove('drag');
  });
});

dropzone.addEventListener('drop', (e) => {
  addFiles(Array.from(e.dataTransfer.files));
});

async function addFiles(fileArray) {
  for (const file of fileArray) {
    if (file.type !== 'application/pdf') continue;
    const buf = await file.arrayBuffer();
    files.push({ name: file.name, arrayBuffer: buf });
  }
  renderList();
}

function renderList() {
  fileListEl.innerHTML = '';
  files.forEach((f, idx) => {
    const li = document.createElement('li');
    li.innerHTML = `<span>${idx + 1}. ${f.name}</span><span class="rm" data-idx="${idx}">삭제</span>`;
    fileListEl.appendChild(li);
  });
  mergeBtn.disabled = files.length === 0;
  downloadLink.classList.remove('show');
  statusEl.textContent = '';
  statusEl.classList.remove('error');
}

fileListEl.addEventListener('click', (e) => {
  if (e.target.classList.contains('rm')) {
    const idx = parseInt(e.target.dataset.idx, 10);
    files.splice(idx, 1);
    renderList();
  }
});

mergeBtn.addEventListener('click', async () => {
  if (files.length === 0) return;

  mergeBtn.disabled = true;
  statusEl.classList.remove('error');
  statusEl.textContent = '처리 중...';

  try {
    const mergedPdf = await PDFDocument.create();
    let successCount = 0;

    for (let i = 0; i < files.length; i++) {
      statusEl.textContent = `처리 중 (${i + 1}/${files.length}): ${files[i].name}`;
      try {
        const srcDoc = await PDFDocument.load(files[i].arrayBuffer);
        const [firstPage] = await mergedPdf.copyPages(srcDoc, [0]);
        mergedPdf.addPage(firstPage);
        successCount++;
      } catch (err) {
        console.error(`'${files[i].name}' 처리 실패:`, err);
      }
    }

    const mergedBytes = await mergedPdf.save();
    const blob = new Blob([mergedBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);

    downloadLink.href = url;
    downloadLink.classList.add('show');
    statusEl.textContent = `✅ 완료! 총 ${successCount}페이지 병합됨`;
  } catch (err) {
    console.error(err);
    statusEl.textContent = '오류가 발생했습니다: ' + err.message;
    statusEl.classList.add('error');
  } finally {
    mergeBtn.disabled = false;
  }
});
</script>



</body></html>
